version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d/
    container_name: sub_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sub_app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=1234
      - DB_NAME=mydb
      - DB_SSLMODE=disable
      - APP_PORT=8080
    depends_on:
      db:
        condition: service_healthy
