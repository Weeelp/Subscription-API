openapi: 3.0.0
info:
  title: Subscriptions API
  version: 1.0.0
  description: Сервис для управления и агрегации данных о подписках пользователей.

paths:
  /subscriptions:
    post:
      summary: Создать новую подписку
      tags:
        - Subscriptions
      requestBody:
        description: Данные новой подписки
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '201':
          description: Подписка успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      summary: Получить список всех подписок
      tags:
        - Subscriptions
      responses:
        '200':
          description: Список всех подписок в системе
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'

  /subscriptions/{id}:
    parameters:
      - $ref: '#/components/parameters/SubscriptionId'
    get:
      summary: Получить подписку по ID
      tags:
        - Subscriptions
      responses:
        '200':
          description: Детальные данные подписки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Обновить данные подписки
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '200':
          description: Данные успешно обновлены
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Удалить подписку
      tags:
        - Subscriptions
      responses:
        '204':
          description: Подписка успешно удалена (тело ответа отсутствует)
        '404':
          $ref: '#/components/responses/NotFound'

  /subscriptions/total:
    get:
      summary: Получить суммарную стоимость подписок за период
      tags:
        - Analytics
      parameters:
        - name: user_id
          in: query
          required: true
          description: UUID пользователя
          schema:
            type: string
            format: uuid
        - name: service_name
          in: query
          required: true
          description: Название сервиса
          schema:
            type: string
        - name: period
          in: query
          required: true
          description: Период в формате ММ-ГГГГ
          schema:
            type: string
            example: "07-2025"
      responses:
        '200':
          description: Расчет стоимости выполнен
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_price:
                    type: integer
                    example: 1200

components:
  parameters:
    SubscriptionId:
      name: id
      in: path
      description: Уникальный идентификатор подписки
      required: true
      schema:
        type: integer
        example: 1

  responses:
    NotFound:
      description: Ресурс не найден
    BadRequest:
      description: Некорректный формат запроса или данных

  schemas:
    Subscription:
      type: object
      properties:
        id:
          type: integer
          description: Автоматически сгенерированный ID
          example: 1
        service_name:
          type: string
          description: Название подписки
          example: "Yandex Plus"
        price:
          type: integer
          description: Стоимость в валюте (целое число)
          example: 400
        user_id:
          type: string
          format: uuid
          description: UUID владельца подписки
          example: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
        start_date:
          type: string
          description: Дата начала подписки
          example: "07-2025"
        end_date:
          type: string
          description: Дата окончания (если есть)
          nullable: true
          example: "07-2026"

    SubscriptionRequest:
      type: object
      required:
        - service_name
        - price
        - user_id
        - start_date
      properties:
        service_name:
          type: string
          example: "Netflix"
        price:
          type: integer
          example: 999
        user_id:
          type: string
          format: uuid
          example: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
        start_date:
          type: string
          example: "01-2024"
        end_date:
          type: string
          nullable: true
          example: null

    CreateResponse:
      type: object
      properties:
        id:
          type: integer
          example: 42
